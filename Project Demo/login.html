<!DOCTYPE html>

<head>

    <style>
        /* login box in the center */
        .login-container {
            width: 420px;
            margin: 60px auto;
            background-color: white;
            padding: 40px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        /* tab buttons at top */
        .tab-buttons {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            font-family: 'Oswald', sans-serif;
            color: #777;
            font-weight: 400;
        }

        .tab-btn.active {
            color: #1c69d4;
            border-bottom: 3px solid #1c69d4;
            margin-bottom: -2px;
        }

        /* form field styling */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            font-family: 'Oswald', sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #1c69d4;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #1c69d4;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Oswald', sans-serif;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .submit-btn:hover {
            background-color: #155bb5;
        }

        .forgot-link {
            text-align: right;
            margin-bottom: 15px;
        }

        .forgot-link a {
            color: #1c69d4;
            font-size: 13px;
            text-decoration: none;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

    <!-- page title -->
    <div class="page-title">
        <h1>My Account</h1>
    </div>

    <!-- login and register box -->
    <div class="login-container">

        <!-- tab switcher -->
        <div class="tab-buttons">
            <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
            <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
        </div>

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">
            </div>
            <div class="forgot-link">
                <a href="#">Forgot Password?</a>
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>
            <button class="submit-btn" onclick="window.location.href='index.html'">Login</button>
        </div>

        <!-- REGISTER FORM -->
        <div id="registerForm" class="hidden">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" placeholder="Create a password">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" placeholder="Re-enter your password">
            </div>
            <div class="checkbox-row">
                <input type="checkbox" id="terms">
                <label for="terms">I agree to the Terms & Conditions</label>
            </div>
            <button class="submit-btn" onclick="window.location.href='index.html'">Create Account</button>
        </div>

    </div>

    <!-- same footer as home page -->
    <footer class="site-footer">
        <div class="footer-top">
            <img src="BMW_White_Logo.svg.asset.1670245093434.svg" alt="BMW Logo" class="footer-logo">
            <div class="footer-links">

                <a href="about.html">More BMW</a>

            </div>
        </div>
        <div class="footer-bottom">
            <p>&copy; 2024 BMW India. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // switch between login and register tab
        function showTab(tab) {
            var loginForm = document.getElementById('loginForm');
            var registerForm = document.getElementById('registerForm');
            var loginTab = document.getElementById('loginTab');
            var registerTab = document.getElementById('registerTab');

            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                loginTab.classList.remove('active');
                registerTab.classList.add('active');
            }
        }
    </script>

</body>
